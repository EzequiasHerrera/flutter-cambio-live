name: howmuch
description: "Howmuch is not just change your money, it's an experience."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.11.3
  google_mlkit_text_recognition: ^0.15.0
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  http: ^1.6.0
  intl: ^0.20.2
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#ff9800"
  image: assets/icon/ic_splash.png
  branding: assets/icon/ic_brand.png
  android_12:
    image: assets/icon/ic_splash.png
    branding: assets/icon/ic_brand.png
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/ic_splash.png
    - assets/icon/ic_brand.png
    - assets/animations/Howie_Home.json
